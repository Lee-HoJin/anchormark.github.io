<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Watermark Experiment Dashboard</title>
    <link rel="stylesheet" href="./style.css" />
    <link rel="stylesheet" href="./chart_split.css" />
    <link rel="stylesheet" href="./chart_size_fix.css" />
  </head>
  <body>
    <header class="hero">
      <div class="heroCopy">
        <p class="eyebrow">Watermark Experiment</p>
        <h1>Main Results Dashboard</h1>
        <p class="lede">Main result charts, CSV tables, and generated qualitative reports in one GitHub Pages-friendly view.</p>
      </div>
      <div class="heroStats" aria-label="Dataset summary">
        <article><span>Main CSV</span><strong id="mainFiles">0</strong></article>
        <article><span>Main Rows</span><strong id="mainRows">0</strong></article>
        <article><span>Reports</span><strong id="reportCount">0</strong></article>
      </div>
    </header>

    <main>
      <section class="panel">
        <div class="panelHeader">
          <div>
            <p class="panelKicker">Grouped Bar Charts</p>
            <h2>Main Results</h2>
          </div>
          <div class="toolbar">
            <select id="mainMetricSelect" aria-label="Select main results metric"></select>
            <input id="mainSearchInput" type="search" placeholder="Search rows..." />
            <button id="downloadMainCsv" type="button">CSV</button>
            <span id="mainStatus" class="status">Loading</span>
          </div>
        </div>
        <div class="splitCharts">
          <div class="chartBody">
            <h3 class="chartTitle">Watermarked</h3>
            <canvas id="mainOriginalChart" aria-label="Watermarked main results bar chart"></canvas>
          </div>
          <div class="chartBody">
            <h3 class="chartTitle">Paraphrased</h3>
            <canvas id="mainParaphrasedChart" aria-label="Paraphrased main results bar chart"></canvas>
          </div>
          <p id="mainEmpty" class="empty" hidden></p>
        </div>
        <div class="rocGrid" aria-label="ROC curves">
          <figure class="rocFigure">
            <figcaption>Original ROC</figcaption>
            <img src="./ROC_orig.png" alt="Original ROC curve" loading="lazy" />
          </figure>
          <figure class="rocFigure">
            <figcaption>Paraphrased ROC</figcaption>
            <img src="./ROC_para.png" alt="Paraphrased ROC curve" loading="lazy" />
          </figure>
        </div>
        <div class="tableWrap">
          <table>
            <thead id="mainTableHead"></thead>
            <tbody id="mainTableBody"></tbody>
          </table>
        </div>
      </section>

      <section class="panel">
        <div class="panelHeader">
          <div>
            <p class="panelKicker">Generated HTML</p>
            <h2>Report Links</h2>
          </div>
        </div>
        <div id="reportGrid" class="reportGrid"></div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.9/dist/chart.umd.min.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
